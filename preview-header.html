<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Header Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #e8ebee;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    min-height: 100vh;
  }
  .modal-frame {
    width: 100%;
    max-width: 540px;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    overflow: hidden;
    height: fit-content;
  }

  /* ── Header ── */
  .client-modal-header {
    position: relative;
    border-radius: 24px;
    padding: 18px 18px 16px;
    background:
      radial-gradient(1200px 320px at 10% 0%, rgba(73, 107, 214, 0.22), transparent 45%),
      linear-gradient(180deg, rgba(245,248,255,0.98) 0%, rgba(255,255,255,0.96) 100%);
    border: 1px solid rgba(148, 163, 184, 0.22);
    box-shadow:
      0 20px 50px rgba(15, 23, 42, 0.12),
      inset 0 1px 0 rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    overflow: hidden;
  }
  .client-modal-header::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.35), transparent 35%);
    pointer-events: none;
  }
  .close-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,0.5);
    background: rgba(90, 105, 145, 0.22);
    color: #fff;
    border-radius: 999px;
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(15, 23, 42, 0.18);
    backdrop-filter: blur(8px);
  }
  .close-btn svg {
    width: 16px;
    height: 16px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    padding-right: 44px;
  }
  .client-identity {
    display: flex;
    align-items: center;
    gap: 16px;
    min-width: 0;
  }
  .avatar-wrap {
    position: relative;
    width: 56px;
    height: 56px;
    flex: 0 0 auto;
  }
  .avatar-ring {
    position: absolute;
    inset: -2px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(160,180,255,0.15));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.85),
      0 8px 20px rgba(57, 76, 140, 0.18);
  }
  .avatar {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    display: grid;
    place-items: center;
    background: linear-gradient(180deg, #4d67b5 0%, #435a9e 100%);
    color: #fff;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.02em;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.28);
  }
  .client-meta {
    min-width: 0;
  }
  .name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .name-row h2 {
    margin: 0;
    font-size: 28px;
    line-height: 1.05;
    font-weight: 650;
    letter-spacing: -0.03em;
    color: #1e293b;
  }
  .client-badge {
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(148,163,184,0.22);
  }
  .sub-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    color: #64748b;
    font-size: 14px;
    font-weight: 500;
  }
  .meta-item {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-width: 0;
  }
  .meta-item svg {
    width: 15px;
    height: 15px;
    color: #7c8aa5;
    flex: 0 0 auto;
  }
  .dot {
    width: 4px;
    height: 4px;
    border-radius: 999px;
    background: #cbd5e1;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
  }
  .icon-action {
    width: 42px;
    height: 42px;
    border-radius: 999px;
    border: 1px solid rgba(148,163,184,0.2);
    background: rgba(255,255,255,0.72);
    color: #64748b;
    display: grid;
    place-items: center;
    cursor: pointer;
    box-shadow:
      0 8px 16px rgba(15,23,42,0.05),
      inset 0 1px 0 rgba(255,255,255,0.85);
    transition: all .18s ease;
  }
  .icon-action:hover {
    transform: translateY(-1px);
    color: #334155;
    background: #ffffff;
    box-shadow:
      0 14px 24px rgba(15,23,42,0.08),
      inset 0 1px 0 rgba(255,255,255,0.95);
  }
  .icon-action svg {
    width: 18px;
    height: 18px;
  }
  .header-bottom {
    margin-top: 16px;
    padding: 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    border-radius: 18px;
    background: rgba(15, 23, 42, 0.035);
    border: 1px solid rgba(148,163,184,0.14);
  }
  .status-chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    height: 34px;
    padding: 0 12px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 600;
    border: 1px solid transparent;
    white-space: nowrap;
    user-select: none;
    cursor: pointer;
    transition: all .15s ease;
  }
  .status-chip svg {
    width: 15px;
    height: 15px;
  }
  .status-confirmed {
    color: #157347;
    background: rgba(34,197,94,0.08);
    border-color: rgba(34,197,94,0.18);
  }
  .status-done {
    color: #2f855a;
    background: rgba(22,163,74,0.08);
    border-color: rgba(22,163,74,0.18);
  }
  .status-no-show {
    color: #dc2626;
    background: rgba(239,68,68,0.08);
    border-color: rgba(239,68,68,0.18);
  }
  .status-cancel {
    color: #e11d48;
    background: rgba(244,63,94,0.08);
    border-color: rgba(244,63,94,0.18);
  }
  .status-move {
    color: #0f766e;
    background: rgba(20,184,166,0.1);
    border-color: rgba(20,184,166,0.2);
  }
  .status-lock {
    color: #64748b;
    background: rgba(100,116,139,0.08);
    border-color: rgba(100,116,139,0.16);
  }

  /* Fake body content */
  .fake-body {
    padding: 20px 24px;
    color: #94a3b8;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="modal-frame">
  <div class="client-modal-header">
    <button class="close-btn" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M8 8L16 16M16 8L8 16" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="header-top">
      <div class="client-identity">
        <div class="avatar-wrap">
          <div class="avatar-ring"></div>
          <div class="avatar">PP</div>
        </div>
        <div class="client-meta">
          <div class="name-row">
            <h2>prout prout</h2>
            <span class="client-badge">Client</span>
          </div>
          <div class="sub-row">
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 8.5C5 7.12 6.12 6 7.5 6h9C17.88 6 19 7.12 19 8.5v7c0 1.38-1.12 2.5-2.5 2.5h-9A2.5 2.5 0 0 1 5 15.5v-7Z" stroke="currentColor" stroke-width="1.7"/>
                <path d="M7 9l5 4 5-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              prout@prout.com
            </span>
            <span class="dot"></span>
            <span class="meta-item">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M6.6 10.8c1.7 3.34 4.26 5.9 7.6 7.6l2.56-2.56c.3-.3.75-.4 1.15-.27 1.25.42 2.58.64 3.95.64.63 0 1.14.5 1.14 1.14V21c0 .63-.51 1.14-1.14 1.14C10.34 22.14 1.86 13.66 1.86 3.14 1.86 2.5 2.37 2 3 2h3.43c.63 0 1.14.5 1.14 1.14 0 1.37.22 2.7.64 3.95.13.4.03.84-.27 1.15L6.6 10.8Z" stroke="currentColor" stroke-width="1.55" stroke-linejoin="round"/>
              </svg>
              +32 489 763 825
            </span>
          </div>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-action" aria-label="Appeler">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M6.6 10.8c1.7 3.34 4.26 5.9 7.6 7.6l2.56-2.56c.3-.3.75-.4 1.15-.27 1.25.42 2.58.64 3.95.64.63 0 1.14.5 1.14 1.14V21c0 .63-.51 1.14-1.14 1.14C10.34 22.14 1.86 13.66 1.86 3.14 1.86 2.5 2.37 2 3 2h3.43c.63 0 1.14.5 1.14 1.14 0 1.37.22 2.7.64 3.95.13.4.03.84-.27 1.15L6.6 10.8Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="icon-action" aria-label="Envoyer un email">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="4" y="6" width="16" height="12" rx="3" stroke="currentColor" stroke-width="1.7"/>
            <path d="M6.5 8.5L12 12.75L17.5 8.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="icon-action" aria-label="Voir la fiche client">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 12a3.25 3.25 0 1 0 0-6.5 3.25 3.25 0 0 0 0 6.5Z" stroke="currentColor" stroke-width="1.7"/>
            <path d="M5.5 18.5c1.3-2.62 3.73-4 6.5-4s5.2 1.38 6.5 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="header-bottom">
      <div class="status-chip status-confirmed">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9 12.5l2 2 4-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Confirm&eacute;
      </div>
      <div class="status-chip status-done">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 12.5l3 3 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Termin&eacute;
      </div>
      <div class="status-chip status-no-show">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M8 8l8 8M16 8l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        No-show
      </div>
      <div class="status-chip status-cancel">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M6.5 12h11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Annuler
      </div>
      <div class="status-chip status-move">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M7 12h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M13.5 8.5L17 12l-3.5 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        D&eacute;placer
      </div>
      <div class="status-chip status-lock">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="5" y="10" width="14" height="10" rx="3" stroke="currentColor" stroke-width="1.8"/>
          <path d="M8.5 10V8a3.5 3.5 0 1 1 7 0v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        Verrouiller
      </div>
    </div>
  </div>
  <div class="fake-body">
    <p style="border-bottom:1px solid #e2e8f0;padding-bottom:12px;margin-bottom:12px;color:#475569;font-weight:600">RDV &nbsp;&nbsp; <span style="color:#94a3b8;font-weight:400">Log</span></p>
    <p>Contenu du modal...</p>
  </div>
</div>
</body>
</html>
