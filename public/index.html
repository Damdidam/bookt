/* ========== CSS VARIABLES ========== */
:root {
  /* Palette */
  --violet: #8B5CF6;
  --violet-dark: #6D28D9;
  --yellow: #FDE047;
  --yellow-deep: #EAB308;
  --magenta: #EC4899;
  --pink: #F9A8D4;
  --bg: #FDF2F8;
  --text: #831843;
  --text-2: #6B1F43;
  --text-3: #9B3464;
  --ink: #1A1A1A;
  --emerald: #059669;
  --white: #FFFFFF;
  --cream: #FAF7F2;

  /* Fonts */
  --font-heading: 'Fredoka', system-ui, -apple-system, sans-serif;
  --font-body: 'Nunito', system-ui, -apple-system, sans-serif;

  /* Layout */
  --container-max: 1200px;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-pill: 50px;
  --border-w: 2.5px;
}

/* ========== RESET ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  color: var(--text-2);
  background: var(--bg);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
img { max-width: 100%; height: auto; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: 0; background: transparent; }
h1, h2, h3, h4 { font-family: var(--font-heading); font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; color: var(--ink); }

/* ========== UTILITIES ========== */
.container { max-width: var(--container-max); margin: 0 auto; padding: 0 20px; }
.section { padding: 48px 0; }
@media (min-width: 768px) { .section { padding: 64px 0; } }
@media (min-width: 1024px) { .section { padding: 80px 0; } }

/* Focus visible for a11y */
a:focus-visible, button:focus-visible, summary:focus-visible {
  outline: 2.5px solid var(--violet);
  outline-offset: 3px;
  border-radius: 4px;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}
