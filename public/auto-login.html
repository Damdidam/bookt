<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Auto-login</title></head>
<body>
<script>
var token = new URLSearchParams(window.location.search).get('t');
if (token) {
  localStorage.setItem('genda_token', token);
  // Fetch actual user/business data from API using the token
  fetch('/api/staff/dashboard', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.user) localStorage.setItem('genda_user', JSON.stringify(d.user));
      if (d.business) localStorage.setItem('genda_business', JSON.stringify(d.business));
      window.location.href = '/dashboard';
    })
    .catch(function() {
      // Fallback: just redirect, dashboard will fetch its own data
      window.location.href = '/dashboard';
    });
} else {
  document.body.textContent = 'Token manquant';
}
</script>
</body>
</html>
