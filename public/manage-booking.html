<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Mon rendez-vous — Genda">
<meta property="og:description" content="Consultez et gérez votre rendez-vous en ligne.">
<title>Mon rendez-vous — Genda</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
.gi{display:inline-block;width:1em;height:1em;vertical-align:-.125em;flex-shrink:0}
.gi-lg{width:1.4em;height:1.4em}
.gi-xl{width:2em;height:2em}

/* ── Kill mobile browser helpers ── */
*{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{-webkit-text-size-adjust:none;-ms-text-size-adjust:none}
body,div,span,label,p,h1,h2,h3,h4,a,button,td,th,li{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
input,textarea,select,[contenteditable]{-webkit-user-select:text!important;-moz-user-select:text!important;user-select:text!important;-webkit-touch-callout:default!important}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF9;--white:#FFF;--surface:#F5F4F1;--border:#E0DDD8;--border-light:#ECEAE6;--text:#1A1816;--text-2:#3D3832;--text-3:#6B6560;--text-4:#9C958E;--primary:#0D7377;--primary-hover:#0A5E61;--primary-light:#EFF9F8;--green:#1B7A42;--green-bg:#EEFAF1;--red:#DC2626;--red-bg:#FEF2F2;--gold:#A68B3C;--gold-bg:#FAF6EC;--serif:'Instrument Serif',Georgia,serif;--sans:'Plus Jakarta Sans',-apple-system,sans-serif;--radius:14px;--radius-sm:10px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.container{width:100%;max-width:520px}
.logo{text-align:center;margin-bottom:24px}
.logo a{font-family:var(--serif);font-size:1.3rem;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.logo .l{width:32px;height:32px;border-radius:8px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.card{background:var(--white);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden}
.card-header{padding:24px 28px;border-bottom:1px solid var(--border-light);text-align:center}
.card-header .status{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:16px;font-size:.78rem;font-weight:700;margin-bottom:10px}
.status.confirmed{background:var(--green-bg);color:var(--green)}.status.cancelled{background:var(--red-bg);color:var(--red)}.status.completed{background:var(--surface);color:var(--text-3)}.status.no_show{background:var(--gold-bg);color:var(--gold)}.status.pending{background:var(--gold-bg);color:var(--gold)}.status.modified_pending{background:#FFF7ED;color:#D97706}.status.pending_deposit{background:#FEF3E2;color:#B45309}
.card-header h1{font-family:var(--serif);font-size:1.5rem;font-weight:400;margin-bottom:4px}
.card-header .biz{font-size:.88rem;color:var(--text-3)}
.details{padding:24px 28px}
.detail-row{display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--border-light)}
.detail-row:last-child{border:none}
.detail-row .icon{width:36px;height:36px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.detail-row .info{flex:1}
.detail-row .label{font-size:.72rem;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.4px}
.detail-row .value{font-size:.92rem;font-weight:600}
.detail-row .sub{font-size:.78rem;color:var(--text-3)}
.cancel-section{padding:20px 28px;border-top:1px solid var(--border-light)}
.cancel-section h3{font-size:.88rem;font-weight:700;margin-bottom:8px;color:var(--red)}
.cancel-section p{font-size:.82rem;color:var(--text-3);margin-bottom:12px}
.cancel-section textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:.85rem;resize:vertical;min-height:60px;margin-bottom:10px}
.cancel-section textarea:focus{outline:none;border-color:var(--red)}
.btn-cancel{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-cancel:hover{opacity:.9}
.btn-cancel:disabled{opacity:.5;cursor:not-allowed}
.deadline-info{padding:12px 16px;background:var(--gold-bg);border-radius:8px;font-size:.78rem;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.past-deadline{background:var(--red-bg);color:var(--red)}
.cancelled-msg{padding:24px 28px;text-align:center}
.cancelled-msg .check{font-size:2.5rem;margin-bottom:8px}
.cancelled-msg h2{font-family:var(--serif);font-size:1.3rem;margin-bottom:4px}
.cancelled-msg p{font-size:.88rem;color:var(--text-3)}
.footer-link{text-align:center;margin-top:16px}
.footer-link a{font-size:.82rem;color:var(--primary);text-decoration:none;font-weight:600}
.footer-link a:hover{text-decoration:underline}
.btn-reschedule-footer{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:.88rem;font-weight:600;cursor:pointer}
.btn-reschedule-footer:hover{opacity:.9}
.loading{text-align:center;padding:60px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:60px}
.error .e-icon{font-size:3rem;margin-bottom:12px}
.cal-row{display:flex;gap:8px;flex-wrap:wrap;padding:16px 28px;border-top:1px solid var(--border-light)}
.cal-row .cal-title{width:100%;font-size:.72rem;font-weight:600;color:var(--text-4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.cal-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border:1.5px solid var(--border-light);border-radius:8px;background:var(--white);font-family:var(--sans);font-size:.78rem;font-weight:600;color:var(--text-2);cursor:pointer;transition:all .15s;text-decoration:none}
.cal-btn:hover{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.cal-btn .ci{font-size:.95rem}
.maps-link{display:inline-flex;align-items:center;gap:4px;font-size:.78rem;color:var(--primary);text-decoration:none;font-weight:600;margin-top:2px}
.maps-link:hover{text-decoration:underline}

/* ── Reschedule UI ── */
.reschedule-section{padding:20px 28px;border-top:1px solid var(--border-light)}
.reschedule-section h3{font-size:.88rem;font-weight:700;margin-bottom:8px;color:var(--primary)}
.reschedule-section p{font-size:.82rem;color:var(--text-3);margin-bottom:12px}
.btn-reschedule{width:100%;padding:12px;background:var(--white);color:var(--primary);border:2px solid var(--primary);border-radius:var(--radius-sm);font-family:var(--sans);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-reschedule:hover{background:var(--primary-light)}
.btn-reschedule:disabled{opacity:.5;cursor:not-allowed}
.reschedule-disabled{padding:12px 16px;background:var(--surface);border-radius:8px;font-size:.82rem;color:var(--text-3)}
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;gap:8px}
.date-nav button{width:40px;height:40px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.date-nav button:hover:not(:disabled){border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.date-nav button:disabled{opacity:.3;cursor:not-allowed}
.date-nav .date-label{font-size:.92rem;font-weight:600;text-align:center;flex:1}
.slot-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:8px 0 16px}
.slot-btn{padding:10px 4px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);font-family:var(--sans);font-size:.82rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.slot-btn:hover{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.slot-btn.selected{border-color:var(--primary);background:var(--primary);color:#fff}
.no-slots{text-align:center;padding:24px;color:var(--text-4);font-size:.85rem}
.slots-loading{text-align:center;padding:24px}
.confirm-box{background:var(--surface);border-radius:var(--radius-sm);padding:16px;margin:12px 0}
.confirm-box .old-time{color:var(--text-4);text-decoration:line-through;font-size:.85rem;margin-bottom:4px}
.confirm-box .new-time{font-weight:700;font-size:.95rem;color:var(--primary)}
.btn-back{display:inline-flex;align-items:center;gap:4px;padding:8px 0;background:none;border:none;font-family:var(--sans);font-size:.82rem;font-weight:600;color:var(--text-3);cursor:pointer;margin-bottom:8px}
.btn-back:hover{color:var(--primary)}
.btn-confirm{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .15s;margin-top:12px}
.btn-confirm:hover{opacity:.9}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}
.deposit-warn{padding:10px 14px;background:#FEF3E2;border-radius:8px;font-size:.78rem;color:#B45309;margin-bottom:12px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div class="container">
  <div class="logo"><a href="/"><span class="l">G</span>Genda</a></div>
  <div class="card" id="cardContent">
    <div class="loading"><div class="spinner"></div><p style="margin-top:12px;color:var(--text-4);font-size:.85rem">Chargement...</p></div>
  </div>
  <div class="footer-link" id="footerLink" style="display:none"></div>
</div>

<script>
function escH(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
const token = window.location.pathname.split('/').pop();
let _data = null;
let _selectedSlot = null;
let _currentDate = null;
let _slotsData = null;

if (!token) { showError('Lien invalide'); }
else { loadBooking(); }

async function loadBooking() {
  try {
    const res = await fetch(`/api/public/manage/${token}`);
    if (!res.ok) {
      // Fallback to old endpoint for backward compat
      const res2 = await fetch(`/api/public/booking/${token}`);
      if (!res2.ok) { showError('Rendez-vous introuvable'); return; }
      const data2 = await res2.json();
      data2.reschedule = { enabled: false };
      _data = data2;
      render(data2);
      return;
    }
    const data = await res.json();
    _data = data;
    render(data);
  } catch (err) { showError('Erreur de chargement'); }
}

function render(d) {
  const bk = d.booking, biz = d.business, can = d.cancellation, resch = d.reschedule;
  const start = new Date(bk.start_at), end = new Date(bk.end_at);
  const dateStr = start.toLocaleDateString('fr-BE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Europe/Brussels' });
  const timeStr = start.toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Brussels' });
  const endStr = end.toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Brussels' });
  const modeLabels = { visio: '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> En visio', phone: '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg> Par téléphone' };
  const statusLabels = { confirmed: '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Confirmé', cancelled: '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Annulé', completed: '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Terminé', no_show: 'No-show', pending: '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 22h14"/><path d="M5 2h14"/><path d="M17 22v-4.172a2 2 0 0 0-.586-1.414L12 12l-4.414 4.414A2 2 0 0 0 7 17.828V22"/><path d="M7 2v4.172a2 2 0 0 0 .586 1.414L12 12l4.414-4.414A2 2 0 0 0 17 6.172V2"/></svg> En attente', modified_pending: '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Modification proposée', pending_deposit: '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> Acompte requis' };
  const promoDiscount = bk.promotion_discount_cents || (d.promotion && d.promotion.discount_cents) || 0;
  const promoLabel = bk.promotion_label || (d.promotion && d.promotion.label) || '';
  const lmDiscountPct = bk.discount_pct || 0;
  const lmDiscount = lmDiscountPct && bk.service.price_cents ? Math.round(bk.service.price_cents * lmDiscountPct / 100) : 0;
  const totalDiscount = promoDiscount + lmDiscount;
  let price;
  if (bk.service.price_cents && totalDiscount > 0) {
    const orig = (bk.service.price_cents / 100).toFixed(2).replace('.', ',') + ' \u20ac';
    const disc = ((bk.service.price_cents - totalDiscount) / 100).toFixed(2).replace('.', ',') + ' \u20ac';
    let discountLabels = '';
    if (promoLabel) discountLabels += '<span style="color:#059669;font-size:.78rem;font-weight:600;margin-left:6px">' + escH(promoLabel) + '</span>';
    if (lmDiscountPct > 0) discountLabels += '<span style="color:#059669;font-size:.78rem;font-weight:600;margin-left:6px">-' + lmDiscountPct + '% last-minute</span>';
    price = '<s style="color:var(--text-4);font-weight:400">' + orig + '</s> ' + disc + discountLabels;
  } else {
    price = bk.service.price_cents ? `${(bk.service.price_cents / 100).toFixed(2).replace('.', ',')} \u20ac` : (bk.service.price_label || '');
  }

  // Apply theme
  if (biz.theme?.primary_color) {
    document.documentElement.style.setProperty('--primary', biz.theme.primary_color);
  }

  let html = `
    <div class="card-header">
      <div class="status ${bk.status}">${statusLabels[bk.status] || bk.status}</div>
      <h1>Votre rendez-vous</h1>
      <div class="biz">${escH(biz.name)}</div>
    </div>
    <div class="details">
      <div class="detail-row">
        <div class="icon"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="info"><div class="label">Date</div><div class="value">${dateStr}</div><div class="sub">${timeStr} – ${endStr}</div></div>
      </div>
      <div class="detail-row">
        <div class="icon"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></div>
        <div class="info"><div class="label">Prestation${bk.service.members && bk.service.members.length > 1 ? 's' : ''}</div>${bk.service.members && bk.service.members.length > 1
          ? bk.service.members.map(function(m) {
              var pracInfo = m.practitioner_name ? ' <span style="color:var(--text-4);font-size:.78rem">— ' + escH(m.practitioner_name) + '</span>' : '';
              return '<div class="value" style="margin-bottom:2px">' + escH(m.name) + pracInfo + '</div><div class="sub">' + m.duration_min + ' min' + (m.price_cents ? ' · ' + (m.price_cents/100).toFixed(2).replace('.', ',') + ' €' : (m.price_label ? ' · ' + escH(m.price_label) : '')) + '</div>';
            }).join('') + '<div class="sub" style="margin-top:4px;font-weight:600">Total : ' + bk.service.duration_min + ' min · ' + price + '</div>'
          : '<div class="value">' + escH(bk.service.name) + '</div><div class="sub">' + bk.service.duration_min + ' min · ' + price + (modeLabels[bk.appointment_mode] ? ' · ' + modeLabels[bk.appointment_mode] : '') + '</div>'
        }</div>
      </div>
      <div class="detail-row">
        <div class="icon"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div class="info"><div class="label">${escH(biz.practitioner_label || 'Praticien')}</div><div class="value">${escH(bk.practitioner.name)}</div>${bk.practitioner.title ? `<div class="sub">${escH(bk.practitioner.title)}</div>` : ''}</div>
      </div>
      ${biz.address ? `<div class="detail-row"><div class="icon"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="info"><div class="label">Adresse</div><div class="value">${escH(biz.address)}</div><a class="maps-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(biz.address)}" target="_blank" rel="noopener">Ouvrir dans Google Maps →</a></div></div>` : ''}
      ${biz.phone ? `<div class="detail-row"><div class="icon"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div><div class="info"><div class="label">Contact</div><div class="value">${escH(biz.phone)}</div>${biz.email ? `<div class="sub">${escH(biz.email)}</div>` : ''}</div></div>` : ''}
      ${bk.comment ? `<div class="detail-row"><div class="icon"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div><div class="info"><div class="label">Votre remarque</div><div class="sub">${escH(bk.comment)}</div></div></div>` : ''}
    </div>
  `;

  // Pass/abonnement info section
  if (bk.deposit_payment_intent_id && bk.deposit_payment_intent_id.startsWith('pass_')) {
    const passCode = bk.deposit_payment_intent_id.replace('pass_', '');
    html += `<div style="padding:20px 28px;border-top:1px solid var(--border-light);background:#ECFDF5">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-weight:700;color:#059669">
        <svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Prestation couverte par votre abonnement
      </div>
      <p style="font-size:.82rem;color:#065F46;margin:0">Pass ${escH(passCode)}</p>
    </div>`;
  }

  // Deposit info section
  if (bk.status === 'pending_deposit' && bk.deposit_amount_cents) {

  // ── Reschedule section ──

      <p>Le nouvel horaire proposé est :</p>
      <div style="padding:12px;background:var(--white);border-radius:8px;border:1.5px solid var(--gold);margin-bottom:14px;font-weight:600;text-align:center">

        <button style="flex:1;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:.9rem;font-weight:600;cursor:pointer" id="acceptBtn" onclick="acceptModification()"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Ça me convient</button>
        <button style="flex:1;padding:12px;background:var(--red);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--sans);font-size:.9rem;font-weight:600;cursor:pointer" id="refuseBtn" onclick="refuseModification()"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Refuser</button>
      </div>
    </div>`;
  } else if (['confirmed', 'pending_deposit', 'pending'].includes(bk.status)) {
    const deadlineDate = new Date(can.deadline);
    const deadlineStr = deadlineDate.toLocaleDateString('fr-BE', { weekday: 'short', day: 'numeric', month: 'short', timeZone: 'Europe/Brussels' }) + ' à ' + deadlineDate.toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Brussels' });

    html += `<div class="cancel-section">
      <h3>Annuler ce rendez-vous</h3>`;

    if (can.deposit_at_risk) {
      const depAmount = (can.deposit_amount_cents / 100).toFixed(2).replace('.', ',');
      html += `
        <div class="deadline-info past-deadline" style="background:#FFF3E0;border-color:#FF9800"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> Attention : le délai d'annulation gratuite (${can.window_hours}h avant) est dépassé. <strong>Votre acompte de ${depAmount}\u202f€ ne sera pas remboursé.</strong></div>
        <p>Vous pouvez toujours annuler, mais l'acompte sera conservé par le salon. Vous pouvez aussi <strong>déplacer</strong> votre rendez-vous sans perdre votre acompte.</p>`;

      html += `
        <div class="deadline-info"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/><path d="M6.38 18.7 4 21"/><path d="M17.64 18.67 20 21"/></svg> Annulation gratuite jusqu'au ${deadlineStr}</div>`;
    } else {
      html += `
        <div class="deadline-info"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/><path d="M6.38 18.7 4 21"/><path d="M17.64 18.67 20 21"/></svg> Vous pouvez annuler ce rendez-vous à tout moment avant l'heure prévue.</div>`;
    }
    html += `
      <p>Une fois annulé, le créneau sera libéré pour d'autres patients.</p>
      <textarea id="cancelReason" placeholder="Raison de l'annulation (optionnel)"></textarea>
      <button class="btn-cancel" id="cancelBtn" onclick="cancelBooking()">Annuler mon rendez-vous</button>
    `;
    html += `</div>`;
  } else if (bk.status === 'cancelled') {
    html += `<div class="cancelled-msg"><div class="check"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div><h2>Rendez-vous annulé</h2><p>Ce rendez-vous a été annulé. Vous pouvez en reprendre un nouveau.</p></div>`;
  } else if (bk.status === 'completed') {
    html += `<div class="cancelled-msg"><div class="check"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><h2>Rendez-vous terminé</h2><p>Merci de votre visite !</p></div>`;

  document.getElementById('cardContent').innerHTML = html;

  // Footer: reschedule button if allowed, hidden otherwise
  const fl = document.getElementById('footerLink');
  if (resch && resch.allowed && ['confirmed','pending_deposit'].includes(bk.status)) {
    fl.style.display = 'block';
    fl.innerHTML = `<button class="btn-reschedule-footer" onclick="showRescheduleUI()"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg> Choisir un autre créneau</button>`;
  } else {
    fl.style.display = 'none';
  }
}

// ── Reschedule UI ──
function _isWorkingDay(dateStr) {
  const wd = _data.reschedule?.working_days;
  if (!wd || wd.length === 0) return true; // no data = show all
  const d = new Date(dateStr + 'T12:00:00Z');
  const jsDay = d.getUTCDay(); // 0=Sun, 1=Mon, ... 6=Sat
  const appDay = jsDay === 0 ? 6 : jsDay - 1; // 0=Mon, ... 6=Sun
  return wd.includes(appDay);
}

function _nextWorkingDay(fromDate, delta) {
  const d = new Date(fromDate + 'T12:00:00');
  for (let i = 0; i < 14; i++) {
    d.setDate(d.getDate() + delta);
    const ds = d.toLocaleDateString('en-CA');
    if (_isWorkingDay(ds)) return ds;
  }
  return d.toLocaleDateString('en-CA'); // fallback
}

function showRescheduleUI() {
  _selectedSlot = null;
  const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Europe/Brussels' });
  _currentDate = _nextWorkingDay(today, 1);
  renderSlotPicker();
}

function renderSlotPicker() {
  const bk = _data.booking, resch = _data.reschedule;
  const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Europe/Brussels' });
  const _mx = new Date(new Date(today + 'T12:00:00').getTime() + resch.window_days * 86400000);
  const maxDate = _mx.getFullYear()+'-'+String(_mx.getMonth()+1).padStart(2,'0')+'-'+String(_mx.getDate()).padStart(2,'0');
  const isPrevDisabled = _currentDate <= today;
  const isNextDisabled = _currentDate >= maxDate;

  const dateObj = new Date(_currentDate + 'T12:00:00');
  const dateLabel = dateObj.toLocaleDateString('fr-BE', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Europe/Brussels' });

  let html = `<div style="padding:24px 28px">
    <button class="btn-back" onclick="loadBooking()">← Retour</button>
    <h2 style="font-family:var(--serif);font-size:1.3rem;margin-bottom:4px">Choisir un nouveau créneau</h2>
    <p style="font-size:.82rem;color:var(--text-3);margin-bottom:16px">${escH(bk.service.name)} · ${bk.service.duration_min} min</p>
    <div class="date-nav">
      <button onclick="navDate(-1)" ${isPrevDisabled ? 'disabled' : ''}><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="date-label">${dateLabel}</div>
      <button onclick="navDate(1)" ${isNextDisabled ? 'disabled' : ''}><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div id="slotsContainer"><div class="slots-loading"><div class="spinner"></div></div></div>
  </div>`;

  document.getElementById('cardContent').innerHTML = html;
  loadSlots(_currentDate);
}

function navDate(delta) {
  _currentDate = _nextWorkingDay(_currentDate, delta);
  _selectedSlot = null;
  renderSlotPicker();
}

async function loadSlots(dateStr) {
  const container = document.getElementById('slotsContainer');
  container.innerHTML = '<div class="slots-loading"><div class="spinner"></div></div>';
  try {
    const res = await fetch(`/api/public/manage/${token}/slots?date=${dateStr}`);
    if (!res.ok) { const d = await res.json(); container.innerHTML = `<div class="no-slots">${escH(d.error || 'Erreur')}</div>`; return; }
    const data = await res.json();
    _slotsData = data.slots || [];
    if (_slotsData.length === 0) {
      container.innerHTML = '<div class="no-slots">Aucun cr\u00e9neau disponible ce jour</div>';
      return;
    }
    let html = '<div class="slot-grid">';
    _slotsData.forEach(function(s, idx) {
      html += `<button class="slot-btn" data-start="${s.start_at}" data-end="${s.end_at}" onclick="selectSlot(this,'${s.start_at}','${s.end_at}',${idx})">${s.start_time}</button>`;
    });
    html += '</div>';
    container.innerHTML = html;
  } catch (err) {
    container.innerHTML = '<div class="no-slots">Erreur de chargement</div>';
  }
}

function selectSlot(el, startAt, endAt, slotIdx) {
  var slotData = _slotsData && _slotsData[slotIdx];
  _selectedSlot = { start_at: startAt, end_at: endAt };
  if (slotData && slotData.practitioners) {
    _selectedSlot.practitioners = slotData.practitioners;
  }
  document.querySelectorAll('.slot-btn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');

  // Show confirmation below grid
  const bk = _data.booking;
  const oldStart = new Date(bk.start_at);
  const newStart = new Date(startAt);
  const newEnd = new Date(endAt);
  const oldDateStr = oldStart.toLocaleDateString('fr-BE', { weekday: 'short', day: 'numeric', month: 'long', timeZone: 'Europe/Brussels' });
  const oldTimeStr = oldStart.toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Brussels' });
  const newDateStr = newStart.toLocaleDateString('fr-BE', { weekday: 'short', day: 'numeric', month: 'long', timeZone: 'Europe/Brussels' });
  const newTimeStr = newStart.toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Brussels' });
  const newEndStr = newEnd.toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Brussels' });

  let confirmEl = document.getElementById('confirmSection');
  if (!confirmEl) {
    confirmEl = document.createElement('div');
    confirmEl.id = 'confirmSection';
    document.getElementById('slotsContainer').appendChild(confirmEl);
  }
  confirmEl.innerHTML = `
    <div class="confirm-box">
      <div class="old-time">${oldDateStr} à ${oldTimeStr}</div>
      <div class="new-time">${newDateStr} · ${newTimeStr} – ${newEndStr}</div>
    </div>
    <button class="btn-confirm" id="confirmBtn" onclick="confirmReschedule()">Confirmer le déplacement</button>
  `;
}

async function confirmReschedule() {
  if (!_selectedSlot) return;
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true; btn.textContent = 'Déplacement en cours...';
  try {
    const res = await fetch(`/api/public/manage/${token}/reschedule`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(_selectedSlot)
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Erreur'); }
    const newStart = new Date(_selectedSlot.start_at);
    const newDateStr = newStart.toLocaleDateString('fr-BE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Europe/Brussels' });
    const newTimeStr = newStart.toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Brussels' });
    document.getElementById('cardContent').innerHTML = `<div class="cancelled-msg" style="padding:40px 28px"><div class="check" style="color:var(--green)"><svg class="gi gi-xl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><h2>Rendez-vous déplacé</h2><p>${newDateStr} à ${newTimeStr}</p><p style="margin-top:12px;font-size:.82rem">Un email de confirmation vous a été envoyé.</p><button class="btn-back" style="margin-top:20px;display:inline-flex" onclick="loadBooking()">Voir mon rendez-vous</button></div>`;
  } catch (err) {
    btn.disabled = false; btn.textContent = 'Confirmer le déplacement';
    alert('Erreur : ' + err.message);
  }
}

// ── Existing functions ──
async function acceptModification() {
  const btn = document.getElementById('acceptBtn');
  btn.disabled = true; btn.textContent = 'Confirmation...';
  try {
    const res = await fetch(`/api/public/booking/${token}/confirm`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
    document.getElementById('cardContent').innerHTML = `<div class="cancelled-msg"><div class="check"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><h2>Nouvel horaire confirmé</h2><p>Votre rendez-vous est confirmé au nouvel horaire. À bientôt !</p></div>`;
  } catch (e) { btn.disabled = false; btn.innerHTML = '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Ça me convient'; alert('Erreur: ' + e.message); }
}

async function refuseModification() {
  if (!confirm('Refuser cette modification annulera le rendez-vous. Continuer ?')) return;
  const btn = document.getElementById('refuseBtn');
  btn.disabled = true; btn.textContent = 'Annulation...';
  try {
    const res = await fetch(`/api/public/booking/${token}/reject`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
    document.getElementById('cardContent').innerHTML = `<div class="cancelled-msg"><div class="check"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div><h2>Modification refusée</h2><p>Votre rendez-vous a été annulé. Vous pouvez reprendre un nouveau créneau.</p></div>`;
  } catch (e) { btn.disabled = false; btn.innerHTML = '<svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Refuser'; alert('Erreur: ' + e.message); }
}

async function cancelBooking() {
  const btn = document.getElementById('cancelBtn');
  const reason = document.getElementById('cancelReason')?.value || '';
  btn.disabled = true; btn.textContent = 'Annulation en cours...';
  try {
    const res = await fetch(`/api/public/booking/${token}/cancel`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason })
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
    loadBooking();
  } catch (err) {
    btn.disabled = false; btn.textContent = 'Annuler mon rendez-vous';
    alert('Erreur : ' + err.message);
  }
}

function showError(msg) {
  document.getElementById('cardContent').innerHTML = `<div class="error"><div class="e-icon"><svg class="gi" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><h2 style="font-family:var(--serif);font-size:1.3rem">${escH(msg)}</h2><p style="color:var(--text-4);margin-top:6px">Le lien est peut-être expiré ou invalide.</p></div>`;
}

function buildGCalUrl(start, end, title, location, bizName) {
  function fmt(d) { return d.toISOString().replace(/[-:]/g, '').replace(/\.\d{3}/, ''); }
  const desc = title + ' — ' + bizName;
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${fmt(start)}/${fmt(end)}&details=${encodeURIComponent(desc)}&location=${encodeURIComponent(location || '')}&ctz=Europe/Brussels`;
}

function buildOutlookUrl(start, end, title, location, bizName) {
  const desc = title + ' — ' + bizName;
  return `https://outlook.live.com/calendar/0/action/compose?subject=${encodeURIComponent(title)}&startdt=${start.toISOString()}&enddt=${end.toISOString()}&body=${encodeURIComponent(desc)}&location=${encodeURIComponent(location || '')}`;
}
</script>
