<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Cadeau — Genda</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
.gi{display:inline-block;width:1em;height:1em;vertical-align:-.125em;flex-shrink:0}

/* ── Kill mobile browser helpers ── */
*{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{-webkit-text-size-adjust:none;-ms-text-size-adjust:none}
body,div,span,label,p,h1,h2,h3,h4,a,button,td,th,li{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}
input,textarea{-webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#FAFAF9;--white:#FFF;--surface:#F5F4F1;--border:#E0DDD8;--border-light:#ECEAE6;--text:#1A1816;--text-2:#3D3832;--text-3:#6B6560;--text-4:#9C958E;--primary:#0D7377;--primary-hover:#0A5E61;--primary-light:#EFF9F8;--primary-soft:#D5EFEC;--green:#1B7A42;--green-bg:#EEFAF1;--red:#DC2626;--red-bg:#FEF2F2;--gold:#A68B3C;--gold-bg:#FAF6EC;--serif:'Instrument Serif',Georgia,serif;--sans:'Plus Jakarta Sans',-apple-system,sans-serif;--radius:16px;--radius-sm:10px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;padding:0;margin:0}
.page-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* ── Hero header ── */
.gc-hero{width:100%;position:relative;overflow:hidden;background:linear-gradient(135deg,#FDF6F0 0%,#FEF0E8 30%,#FCE8E0 60%,#FCDCD4 100%);padding:48px 24px 56px;text-align:center}
.gc-hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:url('https://images.unsplash.com/photo-1513885535751-8b9238bd345a?w=1200&q=80') center top/cover no-repeat;opacity:.12;pointer-events:none}
.gc-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to top,var(--bg),transparent);pointer-events:none}
.gc-hero-content{position:relative;z-index:1}
.gc-hero .logo-link{display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);margin-bottom:20px}
.gc-hero .logo-mark{width:36px;height:36px;border-radius:10px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:.9rem;overflow:hidden;flex-shrink:0}
.gc-hero .logo-mark img{width:100%;height:100%;object-fit:cover}
.gc-hero .logo-name{font-family:var(--serif);font-size:1.1rem;font-weight:400}
.gc-hero .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:50px;background:rgba(255,255,255,.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);font-size:.78rem;font-weight:600;color:var(--primary);margin-bottom:16px;letter-spacing:.3px}
.gc-hero h1{font-family:var(--serif);font-size:2.2rem;font-weight:400;line-height:1.2;margin-bottom:8px;color:var(--text)}
.gc-hero h1 em{font-style:italic;color:var(--primary)}
.gc-hero .subtitle{font-size:.95rem;color:var(--text-3);max-width:380px;margin:0 auto}

/* ── Floating ribbon image ── */
.gc-ribbon{position:absolute;top:-20px;right:-40px;width:280px;height:280px;opacity:.25;pointer-events:none;z-index:0;transform:rotate(-10deg)}
@media(max-width:600px){.gc-ribbon{width:180px;height:180px;top:-10px;right:-20px}}

/* ── Card ── */
.container{width:100%;max-width:540px;padding:0 20px;margin:-28px auto 40px;position:relative;z-index:2}
.card{background:var(--white);border:1px solid var(--border-light);border-radius:var(--radius);box-shadow:0 4px 24px rgba(0,0,0,.06);overflow:hidden}
.card-body{padding:28px}

/* ── Section labels ── */
.section-label{font-size:.72rem;font-weight:700;color:var(--text-4);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border-light)}

/* ── Amount pills ── */
.amount-section{margin-bottom:24px}
.amount-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.amount-pill{padding:12px 22px;border:1.5px solid var(--border);border-radius:50px;background:var(--white);font-family:var(--sans);font-size:.95rem;font-weight:700;color:var(--text-2);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.amount-pill:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);transform:translateY(-1px)}
.amount-pill.active{border-color:var(--primary);background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(13,115,119,.25)}
.custom-amount-row{display:flex;align-items:center;gap:8px}
.custom-amount-row label{font-size:.85rem;font-weight:600;color:var(--text-3);white-space:nowrap}
.custom-amount-input{flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:.92rem;font-weight:600;color:var(--text);background:var(--white);outline:none;transition:all .2s}
.custom-amount-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(13,115,119,.08)}
.custom-amount-input::placeholder{color:var(--text-4);font-weight:400}

/* ── Form fields ── */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--text-3);margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:var(--sans);font-size:.88rem;color:var(--text);background:var(--white);outline:none;transition:all .2s;resize:vertical}
.form-group input:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(13,115,119,.08)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text-4)}
.form-group textarea{min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.form-row{grid-template-columns:1fr}}
.form-group .hint{font-size:.75rem;color:var(--text-4);margin-top:4px}
.opt{font-weight:400;color:var(--text-4);text-transform:none;letter-spacing:0}

/* ── Divider ── */
.form-divider{height:1px;background:var(--border-light);margin:24px 0}

/* ── Submit button ── */
.submit-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 24px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--primary),var(--primary-hover));color:#fff;font-family:var(--sans);font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:24px;box-shadow:0 4px 14px rgba(13,115,119,.2);min-height:54px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(13,115,119,.3)}
.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.submit-btn .spinner-sm{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Loading / error ── */
.loading{text-align:center;padding:80px 24px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
.error{text-align:center;padding:60px 24px}
.error .e-icon{font-size:3rem;margin-bottom:12px}

/* ── Success state ── */
.success-wrap{padding:56px 28px;text-align:center}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.success-wrap h2{font-family:var(--serif);font-size:1.6rem;font-weight:400;margin-bottom:8px}
.success-wrap p{font-size:.9rem;color:var(--text-3);line-height:1.6}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti span{position:absolute;top:-20px;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ── Footer ── */
.footer-link{text-align:center;margin-top:20px;padding-bottom:32px}
.footer-link a{font-size:.82rem;color:var(--primary);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:50px;background:var(--primary-light);transition:all .15s}
.footer-link a:hover{background:var(--primary-soft)}

/* ── Error message inline ── */
.field-error{border-color:var(--red) !important}
.error-msg{font-size:.75rem;color:var(--red);margin-top:4px}

/* ── Secure notice ── */
.secure-notice{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;font-size:.75rem;color:var(--text-4)}
</style>
</head>
<body>
<div class="page-wrap">

  <!-- Hero header -->
  <div class="gc-hero" id="gcHero">
    <img class="gc-ribbon" src="https://images.unsplash.com/photo-1607344645866-009c320b63e0?w=600&q=80" alt="">
    <div class="gc-hero-content">
      <a class="logo-link" id="logoLink" href="/">
        <span class="logo-mark" id="logoMark">G</span>
        <span class="logo-name" id="logoName">Genda</span>
      </a>
      <div class="badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>
        CARTE CADEAU
      </div>
      <h1>Offrez un moment<br>de <em>bien-&#234;tre</em></h1>
      <p class="subtitle" id="heroSubtitle">Faites plaisir &#224; vos proches avec une carte cadeau.</p>
    </div>
  </div>

  <!-- Main card -->
  <div class="container">
    <div class="card" id="cardContent">
      <div class="loading"><div class="spinner"></div><p style="margin-top:12px;color:var(--text-4);font-size:.85rem">Chargement...</p></div>
    </div>
    <div class="footer-link" id="footerLink" style="display:none"></div>
  </div>

</div>

<script>
// Extract slug from URL path: /:slug/gift-card
const pathParts = window.location.pathname.split('/').filter(Boolean);
const slug = pathParts.length >= 2 ? pathParts[pathParts.length - 2] : null;

let selectedAmount = null;
let config = null;

// Check for success redirect
if (new URLSearchParams(window.location.search).get('success') === '1') {
  showSuccess();
} else if (!slug) {
  showError('Lien invalide');
} else {
  loadConfig();
}

async function loadConfig() {
  try {
    const res = await fetch(`/api/public/${slug}/gift-card-config`);
    if (!res.ok) { showError('Configuration introuvable'); return; }
    config = await res.json();
    render();
  } catch (err) { showError('Erreur de chargement'); }
}

function render() {
  // Apply business theme
  if (config.theme?.primary_color) {
    document.documentElement.style.setProperty('--primary', config.theme.primary_color);
    // Derive hover
    var r=parseInt(config.theme.primary_color.slice(1,3),16),g=parseInt(config.theme.primary_color.slice(3,5),16),b=parseInt(config.theme.primary_color.slice(5,7),16);
    var hv='#'+[r,g,b].map(function(c){return Math.max(0,Math.round(c*.82)).toString(16).padStart(2,'0');}).join('');
    document.documentElement.style.setProperty('--primary-hover', hv);
    document.documentElement.style.setProperty('--primary-light', config.theme.primary_color+'12');
    document.documentElement.style.setProperty('--primary-soft', config.theme.primary_color+'22');
  }

  // Logo
  var logoMark = document.getElementById('logoMark');
  var logoName = document.getElementById('logoName');
  if (config.logo_url) {
    logoMark.innerHTML = '<img src="'+esc(config.logo_url)+'" alt="" style="width:100%;height:100%;object-fit:cover">';
  } else {
    var initials = (config.business_name||'G').split(' ').map(function(w){return w[0];}).filter(Boolean).join('').toUpperCase().slice(0,2);
    logoMark.textContent = initials;
  }
  logoName.textContent = config.business_name || 'Genda';
  document.getElementById('logoLink').href = '/' + slug;
  document.getElementById('heroSubtitle').textContent = 'Faites plaisir \u00e0 vos proches avec une carte cadeau ' + (config.business_name || '') + '.';

  document.title = `Carte Cadeau \u2014 ${config.business_name || 'Genda'}`;

  // Build amount pills
  const amountsCents = config.amounts || [2500, 5000, 7500, 10000];
  const minAmount = (config.min_amount_cents || 1000) / 100;
  const maxAmount = (config.max_amount_cents || 50000) / 100;

  let pillsHtml = amountsCents.map(a => {
    const eur = (a / 100);
    return `<button class="amount-pill" data-amount="${eur}" onclick="selectAmount(${eur}, this)">${eur.toFixed(0)} \u20ac</button>`;
  }).join('');

  const html = `
    <div class="card-body">
      <div class="amount-section">
        <div class="section-label">Choisir un montant</div>
        <div class="amount-pills">${pillsHtml}</div>
        <div class="custom-amount-row">
          <label for="customAmount">Montant libre :</label>
          <input type="number" class="custom-amount-input" id="customAmount" placeholder="${minAmount}\u2013${maxAmount} \u20ac" min="${minAmount}" max="${maxAmount}" step="1" oninput="selectCustomAmount(this)">
          <span style="font-size:.92rem;font-weight:700;color:var(--text-3)">\u20ac</span>
        </div>
      </div>

      <div class="form-divider"></div>
      <div class="section-label">De la part de</div>

      <div class="form-row">
        <div class="form-group">
          <label for="senderName">Votre nom</label>
          <input type="text" id="senderName" placeholder="Votre nom" required>
        </div>
        <div class="form-group">
          <label for="senderEmail">Votre email</label>
          <input type="email" id="senderEmail" placeholder="votre@email.com" required>
        </div>
      </div>

      <div class="form-divider"></div>
      <div class="section-label">Pour</div>

      <div class="form-row">
        <div class="form-group">
          <label for="recipientName">Nom du destinataire</label>
          <input type="text" id="recipientName" placeholder="Nom du destinataire" required>
        </div>
        <div class="form-group">
          <label for="recipientEmail">Email du destinataire</label>
          <input type="email" id="recipientEmail" placeholder="destinataire@email.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="message">Message personnel <span class="opt">(optionnel)</span></label>
        <textarea id="message" placeholder="Un petit mot pour accompagner votre cadeau\u2026"></textarea>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="submitGiftCard()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>
        Offrir cette carte cadeau \u2192
      </button>
      <div class="secure-notice">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Paiement s\u00e9curis\u00e9 par Stripe
      </div>
    </div>`;

  document.getElementById('cardContent').innerHTML = html;
  showFooterLink();
}

function selectAmount(amount, el) {
  selectedAmount = amount;
  const custom = document.getElementById('customAmount');
  if (custom) custom.value = '';
  document.querySelectorAll('.amount-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
}

function selectCustomAmount(input) {
  const val = parseFloat(input.value);
  if (val && val > 0) {
    selectedAmount = val;
    document.querySelectorAll('.amount-pill').forEach(p => p.classList.remove('active'));
  } else {
    selectedAmount = null;
  }
}

function validateForm() {
  let valid = true;
  document.querySelectorAll('.field-error').forEach(el => el.classList.remove('field-error'));
  document.querySelectorAll('.error-msg').forEach(el => el.remove());

  if (!selectedAmount || selectedAmount <= 0) {
    const pills = document.querySelector('.amount-pills');
    pills.insertAdjacentHTML('beforebegin', '<div class="error-msg">Veuillez choisir un montant</div>');
    valid = false;
  } else if (config) {
    const min = (config.min_amount_cents || 1000) / 100;
    const max = (config.max_amount_cents || 50000) / 100;
    if (selectedAmount < min || selectedAmount > max) {
      const pills = document.querySelector('.amount-pills');
      pills.insertAdjacentHTML('beforebegin', `<div class="error-msg">Le montant doit \u00eatre entre ${min} \u20ac et ${max} \u20ac</div>`);
      valid = false;
    }
  }

  const fields = [
    { id: 'senderName', msg: 'Veuillez entrer votre nom' },
    { id: 'senderEmail', msg: 'Veuillez entrer votre email' },
    { id: 'recipientName', msg: 'Veuillez entrer le nom du destinataire' },
    { id: 'recipientEmail', msg: 'Veuillez entrer l\'email du destinataire' }
  ];

  fields.forEach(f => {
    const el = document.getElementById(f.id);
    if (!el.value.trim()) {
      el.classList.add('field-error');
      el.insertAdjacentHTML('afterend', `<div class="error-msg">${f.msg}</div>`);
      valid = false;
    }
  });

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const senderEmail = document.getElementById('senderEmail');
  const recipientEmail = document.getElementById('recipientEmail');
  if (senderEmail.value.trim() && !emailRegex.test(senderEmail.value.trim())) {
    senderEmail.classList.add('field-error');
    if (!senderEmail.nextElementSibling?.classList?.contains('error-msg')) {
      senderEmail.insertAdjacentHTML('afterend', '<div class="error-msg">Email invalide</div>');
    }
    valid = false;
  }
  if (recipientEmail.value.trim() && !emailRegex.test(recipientEmail.value.trim())) {
    recipientEmail.classList.add('field-error');
    if (!recipientEmail.nextElementSibling?.classList?.contains('error-msg')) {
      recipientEmail.insertAdjacentHTML('afterend', '<div class="error-msg">Email invalide</div>');
    }
    valid = false;
  }

  return valid;
}

const GIFT_ICON = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5A4.8 8 0 0 1 12 8a4.8 8 0 0 1 4.5-5 2.5 2.5 0 0 1 0 5"/></svg>';

async function submitGiftCard() {
  if (!validateForm()) return;

  const btn = document.getElementById('submitBtn');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span> Redirection vers le paiement\u2026';

  const body = {
    amount_cents: Math.round(selectedAmount * 100),
    buyer_name: document.getElementById('senderName').value.trim(),
    buyer_email: document.getElementById('senderEmail').value.trim(),
    recipient_name: document.getElementById('recipientName').value.trim(),
    recipient_email: document.getElementById('recipientEmail').value.trim(),
    message: document.getElementById('message').value.trim() || null
  };

  try {
    const res = await fetch(`/api/public/${slug}/gift-card/checkout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || 'Une erreur est survenue');
      btn.disabled = false;
      btn.innerHTML = GIFT_ICON + ' Offrir cette carte cadeau \u2192';
      return;
    }
    if (data.url) window.location.href = data.url;
  } catch (err) {
    alert('Erreur de connexion');
    btn.disabled = false;
    btn.innerHTML = GIFT_ICON + ' Offrir cette carte cadeau \u2192';
  }
}

function showSuccess() {
  // Hide hero subtitle for cleaner look
  document.getElementById('heroSubtitle').textContent = '';
  document.querySelector('.gc-hero h1').innerHTML = 'Merci pour votre <em>g\u00e9n\u00e9rosit\u00e9</em> !';

  document.getElementById('cardContent').innerHTML = `
    <div class="success-wrap">
      <div class="success-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Carte cadeau envoy\u00e9e !</h2>
      <p>Le destinataire recevra sa carte cadeau par email avec un code unique.<br>Merci pour votre achat !</p>
    </div>`;

  // Confetti
  launchConfetti();

  if (slug) {
    const fl = document.getElementById('footerLink');
    fl.innerHTML = '<a href="/' + slug + '/book"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> R\u00e9server un rendez-vous</a>';
    fl.style.display = '';
  }
}

function launchConfetti() {
  var container = document.createElement('div');
  container.className = 'confetti';
  document.body.appendChild(container);
  var colors = ['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#FF8B94','#DDA0DD','#98D8C8','#F7DC6F'];
  for (var i = 0; i < 60; i++) {
    var span = document.createElement('span');
    span.style.left = Math.random() * 100 + '%';
    span.style.background = colors[Math.floor(Math.random() * colors.length)];
    span.style.width = (6 + Math.random() * 8) + 'px';
    span.style.height = (6 + Math.random() * 8) + 'px';
    span.style.animationDuration = (2 + Math.random() * 2) + 's';
    span.style.animationDelay = (Math.random() * 1.5) + 's';
    span.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(span);
  }
  setTimeout(function() { container.remove(); }, 5000);
}

function showFooterLink() {
  if (!config || !slug) return;
  const fl = document.getElementById('footerLink');
  fl.innerHTML = `<a href="/${slug}/book"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> R\u00e9server chez ${esc(config.business_name)}</a>`;
  fl.style.display = '';
}

function showError(msg) {
  document.getElementById('cardContent').innerHTML = `<div class="error"><div class="e-icon">\u26a0\ufe0f</div><p style="font-size:.92rem;font-weight:600">${msg}</p><p style="font-size:.82rem;color:var(--text-3);margin-top:6px">V\u00e9rifiez le lien ou contactez le salon.</p></div>`;
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
